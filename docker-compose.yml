services:
  firefly-brain-db:
    image: postgres:16-alpine
    container_name: firefly-brain-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-firefly_brain}
      POSTGRES_USER: ${POSTGRES_USER:-firefly_brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
    volumes:
      - firefly_brain_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firefly_brain} -d ${POSTGRES_DB:-firefly_brain}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5434}:5432"

  firefly-brain-api:
    build: ./backend
    container_name: firefly-brain-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      firefly-brain-db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8010}:8000"
    volumes:
      - ./backend/app:/app/app

  firefly-brain-web:
    build: ./frontend
    container_name: firefly-brain-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://192.168.1.49:8010}
    depends_on:
      - firefly-brain-api
    ports:
      - "${WEB_PORT:-3010}:3000"

volumes:
  firefly_brain_db:
